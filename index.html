<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mishra Family:Home Page</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
}

.login-box {
    background: white;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    width: 300px;
    text-align: center;
}

.login-box h2 {
    margin-bottom: 20px;
}

.input-group {
    margin-bottom: 15px;
    text-align: left;
}

.input-group label {
    font-size: 14px;
}

.input-group input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #667eea;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #5a67d8;
}

.error {
    color: red;
    font-size: 14px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>Login</h2>
    
    <div class="input-group">
        <label>Username</label>
        <input type="text" id="username">
    </div>

    <div class="input-group">
        <label>Password</label>
        <input type="password" id="password">
    </div>

    <button onclick="login()">Login</button>

    <div class="error" id="error"></div>
</div>

<script>
const _0xily = "cmFtYXdhZGg=";
const _0xabc = "cmFtYXdhZGhAMTk5Mw==";

function decode(str) {
    return atob(str);
}

function login() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;
    
    const correctUser = decode(_0xily);
    const correctPass = decode(_0xabc);

    if(user === correctUser && pass === correctPass) {
         window.location.href = "mishrafamily.html";
         alert("Welcome to view Mishra Family");
    } else {
        document.getElementById("error").innerText = "Authentication failed. Please re-enter details.";
    }
}
</script>

</body>
</html>
