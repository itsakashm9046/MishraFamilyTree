            width: 100px;
            height: 100px;

            margin-top: 30px;
            padding: 20px;
            background: white;
            border: 1px solid #ccc;
            display: none;
            overflow-x: auto;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        table,
        th,
        td {
            border: 1px solid black;
        }

        th,
        td {
            padding: 8px;
            text-align: center;
        }

</head>
